# This is used in development only (Alchemy is used for production deployments)

name = "zconsole-party-pics-mini-app-dev"
main = "server/src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "zconsole-party-pics-mini-app-dev-db"
database_id = "local"

# Durable Object binding
[[durable_objects.bindings]]
name = "DURABLE_OBJECT"
class_name = "Broadcaster"
script_name = "zconsole-party-pics-mini-app-dev"

# Durable Object migration
[[migrations]]
tag = "v1"
new_classes = ["Broadcaster"]

# Values the Worker needs from `.env`. In local dev, wrangler dev loads ONLY these
# keys from `.env` into c.env, keeping deploy creds (ALCHEMY_STATE_TOKEN etc.) out of
# the app runtime. Missing keys log a warning; dev stays runnable. NEVER create a
# .dev.vars file — its presence makes wrangler dev ignore .env entirely. In
# production these are bound in alchemy.run.ts (see docs/secrets.md). All four are
# env-invariant: one remote R2 bucket serves both dev and prod.
[secrets]
required = ["R2_ACCOUNT_ID", "R2_BUCKET_NAME", "R2_ACCESS_KEY_ID", "R2_SECRET_ACCESS_KEY"]

# Origins the Worker accepts Local First Auth JWTs for (dev: the Vite client and the
# wrangler dev server). Production is set via alchemy.run.ts.
[vars]
ALLOWED_ORIGINS = "http://localhost:5175,http://localhost:8789"

# Static assets (client build)
# In dev: Vite serves client at :5173 (this is unused)
# In production: Alchemy uploads these assets to Workers
# [site]
# bucket = "./client/dist"

# Dev server configuration
[dev]
port = 8789