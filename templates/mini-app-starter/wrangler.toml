# This is used in development only (Alchemy is used for production deployments)

name = "mini-app-starter-dev"
main = "server/src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "mini-app-starter-dev-db"
database_id = "local"

# Durable Object binding
[[durable_objects.bindings]]
name = "DURABLE_OBJECT"
class_name = "Broadcaster"
script_name = "mini-app-starter-dev"

# Durable Object migration
[[migrations]]
tag = "v1"
new_classes = ["Broadcaster"]

# Static assets (client build)
# In dev: Vite serves client at :5173 (this is unused)
# In production: Alchemy uploads these assets to Workers
# [site]
# bucket = "./client/dist"

# Secrets required by the Worker (uncomment when you add your first secret).
# In local dev, wrangler dev loads ONLY these keys from `.env` into c.env,
# keeping deploy creds (ALCHEMY_STATE_TOKEN etc.) out of the app runtime.
# Missing keys log a warning; dev stays runnable. NEVER create a .dev.vars
# file — its presence makes wrangler dev ignore .env entirely.
# [secrets]
# required = ["MY_SECRET"]

# Origins the Worker accepts Local First Auth JWTs for (dev: the Vite client and the
# wrangler dev server). Set your deployed origin in alchemy.run.ts for production.
[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:8787"

# Dev server configuration
[dev]
port = 8787