# One workspace for the whole ZConsole monorepo.
#
# Each app under apps/ keeps its own client/server/shared trio, so the globs
# reach one level into each app. `templates/` is deliberately EXCLUDED: the
# starter template still carries the generic `@starter/*` package names, and
# installing it would reintroduce the very name collision this layout fixes.
# `scripts/new-app.ts` reads it as plain files and rescopes on copy.
packages:
  - apps/*
  - apps/*/client
  - apps/*/server
  - apps/*/shared

# pnpm 10 blocks dependency build scripts by default. These three need theirs:
# workerd is wrangler's runtime, esbuild is vite's bundler, sharp is image processing.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
